site_name: Enigma
site_description: Modern C++ cryptography library and Python extension for secure password hashing and file/byte encryption.
site_author: dsainvg
site_url: https://dsainvg.github.io/enigma/
repo_name: dsainvg/enigma
repo_url: https://github.com/dsainvg/enigma
edit_uri: edit/master/docs/

theme:
  name: material
  language: en
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - navigation.instant
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
    - content.code.copy
    - content.code.annotate
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: slate
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: slate
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: Fira Code

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - User Guide:
    - Welcome: index.md
    - Try Online: try.md
    - Try Full Screen: try/fs.md
    - Installation: installation.md
    - Command Line (CLI): cli.md
    - Python API: python.md
    - Performance & Tuning: performance.md
    - Security & Warnings: security.md
  - Developer Guide:
    - Contributing Overview: dev/index.md
    - Repository Architecture: dev/architecture.md
    - Cryptographic Algorithms: dev/algorithms.md
    - Compiling & Testing: dev/build.md
    - Benchmarks: dev/benchmarks.md
